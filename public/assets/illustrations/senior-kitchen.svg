<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="kt_wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4d9c2"></stop>
      <stop offset="1" stop-color="#ecd8cc"></stop>
    </linearGradient>
    <linearGradient id="kt_floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d9c9b3"></stop>
      <stop offset="1" stop-color="#bfa988"></stop>
    </linearGradient>
    <linearGradient id="kt_cab" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffaf2"></stop>
      <stop offset="1" stop-color="#efe4cf"></stop>
    </linearGradient>
  </defs>

  <rect width="800" height="800" fill="url(#kt_wall)"></rect>
  <rect y="560" width="800" height="240" fill="url(#kt_floor)"></rect>
  <rect y="560" width="800" height="6" fill="#a08864" opacity="0.4"></rect>

  <!-- cupboard behind -->
  <g transform="translate(80,90)">
    <rect width="640" height="200" fill="url(#kt_cab)" stroke="#1a1815" stroke-width="3"></rect>
    <line x1="320" y1="0" x2="320" y2="200" stroke="#1a1815" stroke-width="3"></line>
    <rect x="40" y="40" width="240" height="120" fill="none" stroke="#1a1815" stroke-width="2"></rect>
    <rect x="360" y="40" width="240" height="120" fill="none" stroke="#1a1815" stroke-width="2"></rect>
    <circle cx="300" cy="100" r="6" fill="#c69749"></circle>
    <circle cx="340" cy="100" r="6" fill="#c69749"></circle>
    <!-- plates inside -->
    <circle cx="120" cy="100" r="34" fill="#7da9c9" stroke="#1a1815" stroke-width="2"></circle>
    <circle cx="200" cy="100" r="34" fill="#f4d9c2" stroke="#1a1815" stroke-width="2"></circle>
    <circle cx="480" cy="100" r="34" fill="#f4d9c2" stroke="#1a1815" stroke-width="2"></circle>
  </g>

  <!-- counter -->
  <rect x="40" y="540" width="720" height="26" fill="#8a857c" stroke="#1a1815" stroke-width="3"></rect>

  <!-- gold box (open, being packed) -->
  <g transform="translate(420,360)">
    <ellipse cx="120" cy="232" rx="140" ry="16" fill="#1a1815" opacity="0.2"></ellipse>
    <!-- open flaps -->
    <polygon points="20,60 120,30 130,8 30,38" fill="#dcb672" stroke="#1a1815" stroke-width="2"></polygon>
    <polygon points="220,60 120,30 110,8 210,38" fill="#c69749" stroke="#1a1815" stroke-width="2"></polygon>
    <!-- box body -->
    <polygon points="20,60 120,30 220,60 220,170 120,200 20,170" fill="#b88a4a"></polygon>
    <polygon points="20,60 120,30 220,60 120,90 20,60" fill="#9c7227"></polygon>
    <polygon points="220,60 220,170 120,200 120,90" fill="#8a6224"></polygon>
    <polygon points="20,60 20,170 120,200 120,90" fill="#b88a4a" stroke="#6e4f1c" stroke-width="2"></polygon>
    <text x="50" y="150" font-family="Georgia, serif" font-size="13" fill="#1a1815" opacity="0.55" letter-spacing="1.5">KITCHEN</text>
  </g>

  <!-- wrapped plates / china stacked beside the box -->
  <g transform="translate(150,400)">
    <ellipse cx="90" cy="180" rx="110" ry="14" fill="#1a1815" opacity="0.2"></ellipse>
    <!-- stack of wrapped plates -->
    <ellipse cx="90" cy="170" rx="86" ry="22" fill="#fffaf2" stroke="#1a1815" stroke-width="3"></ellipse>
    <ellipse cx="90" cy="140" rx="80" ry="20" fill="#efe4cf" stroke="#1a1815" stroke-width="3"></ellipse>
    <ellipse cx="90" cy="112" rx="74" ry="18" fill="#fffaf2" stroke="#1a1815" stroke-width="3"></ellipse>
    <ellipse cx="90" cy="86" rx="68" ry="16" fill="#efe4cf" stroke="#1a1815" stroke-width="3"></ellipse>
    <!-- wrapping paper crinkle lines -->
    <line x1="40" y1="100" x2="55" y2="160" stroke="#1a1815" stroke-width="1.5" opacity="0.4"></line>
    <line x1="90" y1="76" x2="90" y2="172" stroke="#1a1815" stroke-width="1.5" opacity="0.4"></line>
    <line x1="140" y1="100" x2="125" y2="160" stroke="#1a1815" stroke-width="1.5" opacity="0.4"></line>
  </g>

  <!-- loose packing paper on counter -->
  <g transform="translate(360,500)">
    <path d="M0,40 Q30,10 70,30 Q110,10 140,40 Q130,60 70,55 Q20,60 0,40 Z" fill="#fffaf2" stroke="#1a1815" stroke-width="2"></path>
    <line x1="30" y1="30" x2="50" y2="48" stroke="#1a1815" stroke-width="1.5" opacity="0.4"></line>
    <line x1="90" y1="28" x2="110" y2="46" stroke="#1a1815" stroke-width="1.5" opacity="0.4"></line>
  </g>

  <!-- a single wrapped cup -->
  <g transform="translate(640,470)">
    <ellipse cx="30" cy="92" rx="42" ry="8" fill="#1a1815" opacity="0.2"></ellipse>
    <path d="M0,30 Q30,12 60,30 L54,84 Q30,94 6,84 Z" fill="#fffaf2" stroke="#1a1815" stroke-width="3"></path>
    <line x1="30" y1="20" x2="30" y2="88" stroke="#1a1815" stroke-width="1.5" opacity="0.4"></line>
  </g>
</svg>

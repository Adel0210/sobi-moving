<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="wg-wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffaf2"/>
      <stop offset="1" stop-color="#efe4cf"/>
    </linearGradient>
    <linearGradient id="wg-floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#efe4cf"/>
      <stop offset="1" stop-color="#d9c9b3"/>
    </linearGradient>
  </defs>

  <rect width="800" height="1000" fill="url(#wg-wall)"/>
  <rect y="660" width="800" height="340" fill="url(#wg-floor)"/>
  <line x1="0" y1="660" x2="800" y2="660" stroke="#a08864" stroke-width="3" opacity="0.5"/>

  <!-- framed picture -->
  <g transform="translate(120,160)">
    <rect width="180" height="140" fill="#fffaf2" stroke="#1a1815" stroke-width="3"/>
    <rect x="16" y="16" width="148" height="108" fill="#7da9c9"/>
    <polygon points="16,124 70,70 110,110 140,84 164,124" fill="#7d9269"/>
    <circle cx="130" cy="44" r="16" fill="#d6ad6e"/>
  </g>

  <!-- floor lamp -->
  <g transform="translate(620,300)">
    <polygon points="20,0 90,0 75,70 35,70" fill="#d6ad6e" stroke="#1a1815" stroke-width="3"/>
    <rect x="50" y="70" width="8" height="280" fill="#1a1815"/>
    <ellipse cx="54" cy="356" rx="42" ry="10" fill="#1a1815"/>
  </g>

  <!-- potted sage plant -->
  <g transform="translate(490,430)">
    <circle cx="40" cy="60" r="44" fill="#7d9269" stroke="#1a1815" stroke-width="3"/>
    <circle cx="14" cy="50" r="30" fill="#8aa07a" stroke="#1a1815" stroke-width="3"/>
    <circle cx="64" cy="48" r="28" fill="#8aa07a" stroke="#1a1815" stroke-width="3"/>
    <path d="M22,150 L58,150 L66,96 L14,96 Z" fill="#b85c3c" stroke="#1a1815" stroke-width="3"/>
  </g>

  <!-- rug -->
  <polygon points="120,820 680,820 760,940 40,940" fill="#b85c3c" opacity="0.85" stroke="#1a1815" stroke-width="3"/>
  <polygon points="180,840 620,840 670,910 130,910" fill="none" stroke="#fffaf2" stroke-width="3" opacity="0.5"/>

  <!-- terracotta sofa -->
  <g transform="translate(150,560)">
    <ellipse cx="250" cy="290" rx="280" ry="18" fill="#1a1815" opacity="0.2"/>
    <!-- back -->
    <rect x="20" y="40" width="460" height="120" rx="24" fill="#b85c3c" stroke="#1a1815" stroke-width="3"/>
    <!-- seat -->
    <rect x="0" y="140" width="500" height="110" rx="22" fill="#8a4127" stroke="#1a1815" stroke-width="3"/>
    <!-- cushions -->
    <rect x="40" y="120" width="190" height="70" rx="16" fill="#c96a48" stroke="#1a1815" stroke-width="3"/>
    <rect x="270" y="120" width="190" height="70" rx="16" fill="#c96a48" stroke="#1a1815" stroke-width="3"/>
    <!-- arms -->
    <rect x="-8" y="90" width="56" height="160" rx="20" fill="#b85c3c" stroke="#1a1815" stroke-width="3"/>
    <rect x="452" y="90" width="56" height="160" rx="20" fill="#b85c3c" stroke="#1a1815" stroke-width="3"/>
    <!-- legs -->
    <rect x="30" y="250" width="16" height="36" fill="#1a1815"/>
    <rect x="454" y="250" width="16" height="36" fill="#1a1815"/>
    <!-- throw pillow -->
    <rect x="60" y="100" width="64" height="64" rx="12" fill="#d6ad6e" stroke="#1a1815" stroke-width="3" transform="rotate(-8 92 132)"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="fnd-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffaf2"/>
      <stop offset="1" stop-color="#efe4cf"/>
    </linearGradient>
    <clipPath id="fnd-clip"><rect width="800" height="1000"/></clipPath>
  </defs>
  <g clip-path="url(#fnd-clip)">
    <rect width="800" height="1000" fill="#f4ead8"/>
    <circle cx="400" cy="430" r="360" fill="url(#fnd-bg)"/>
    <circle cx="400" cy="430" r="360" fill="none" stroke="#efe4cf" stroke-width="2"/>
    <ellipse cx="400" cy="930" rx="240" ry="26" fill="#1a1815" opacity="0.2"/>
    <!-- shoulders / shirt -->
    <path d="M150 1000 V820 q0-130 120-180 l130-46 130 46 q120 50 120 180 V1000 Z" fill="#b85c3c"/>
    <path d="M150 1000 V820 q0-130 120-180 l130-46 130 46 q120 50 120 180 V1000 Z" fill="none" stroke="#1a1815" stroke-width="3"/>
    <path d="M330 612 l70 70 70-70 v60 l-70 50 -70-50 Z" fill="#8a4127"/>
    <!-- neck -->
    <rect x="358" y="540" width="84" height="120" rx="20" fill="#c98a5c"/>
    <rect x="358" y="540" width="84" height="120" rx="20" fill="none" stroke="#1a1815" stroke-width="3"/>
    <!-- head -->
    <ellipse cx="400" cy="420" rx="150" ry="170" fill="#c98a5c"/>
    <ellipse cx="400" cy="420" rx="150" ry="170" fill="none" stroke="#1a1815" stroke-width="3"/>
    <!-- ears -->
    <circle cx="252" cy="425" r="26" fill="#c98a5c" stroke="#1a1815" stroke-width="3"/>
    <circle cx="548" cy="425" r="26" fill="#c98a5c" stroke="#1a1815" stroke-width="3"/>
    <!-- hair -->
    <path d="M256 360 q-12-180 144-188 q156 8 144 188 q-30-90 -144-86 q-114-4 -144 86 Z" fill="#1a1815"/>
    <!-- short beard -->
    <path d="M270 470 q10 130 130 150 q120-20 130-150 q-40 60 -130 64 q-90-4 -130-64 Z" fill="#1a1815"/>
    <path d="M270 470 q10 130 130 150 q120-20 130-150 q-40 60 -130 64 q-90-4 -130-64 Z" fill="none" stroke="#1a1815" stroke-width="3" stroke-linejoin="round"/>
    <!-- eyebrows -->
    <path d="M318 392 q34-20 66 0" fill="none" stroke="#1a1815" stroke-width="6" stroke-linecap="round"/>
    <path d="M416 392 q34-20 66 0" fill="none" stroke="#1a1815" stroke-width="6" stroke-linecap="round"/>
    <!-- eyes -->
    <circle cx="350" cy="430" r="9" fill="#1a1815"/>
    <circle cx="450" cy="430" r="9" fill="#1a1815"/>
    <!-- nose -->
    <path d="M400 440 v34 q-12 8 -22 2" fill="none" stroke="#1a1815" stroke-width="4" stroke-linecap="round"/>
    <!-- smile -->
    <path d="M352 508 q48 42 96 0" fill="none" stroke="#1a1815" stroke-width="5" stroke-linecap="round"/>
  </g>
</svg>

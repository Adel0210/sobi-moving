<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="t1-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffaf2"/>
      <stop offset="1" stop-color="#efe4cf"/>
    </linearGradient>
    <clipPath id="t1-clip"><rect width="800" height="1000"/></clipPath>
  </defs>
  <g clip-path="url(#t1-clip)">
    <rect width="800" height="1000" fill="#f1e7d4"/>
    <circle cx="400" cy="430" r="360" fill="url(#t1-bg)"/>
    <ellipse cx="400" cy="930" rx="240" ry="26" fill="#1a1815" opacity="0.2"/>
    <!-- shoulders / sage work shirt -->
    <path d="M150 1000 V820 q0-130 120-180 l130-46 130 46 q120 50 120 180 V1000 Z" fill="#7d9269"/>
    <path d="M150 1000 V820 q0-130 120-180 l130-46 130 46 q120 50 120 180 V1000 Z" fill="none" stroke="#1a1815" stroke-width="3"/>
    <!-- collar -->
    <path d="M335 610 l65 64 65-64 -22-14 -43 36 -43-36 Z" fill="#6b7e5a"/>
    <line x1="400" y1="674" x2="400" y2="780" stroke="#1a1815" stroke-width="3"/>
    <!-- neck -->
    <rect x="358" y="540" width="84" height="120" rx="20" fill="#e8b98f"/>
    <rect x="358" y="540" width="84" height="120" rx="20" fill="none" stroke="#1a1815" stroke-width="3"/>
    <!-- head -->
    <ellipse cx="400" cy="420" rx="150" ry="170" fill="#e8b98f"/>
    <ellipse cx="400" cy="420" rx="150" ry="170" fill="none" stroke="#1a1815" stroke-width="3"/>
    <!-- ears -->
    <circle cx="252" cy="425" r="26" fill="#e8b98f" stroke="#1a1815" stroke-width="3"/>
    <circle cx="548" cy="425" r="26" fill="#e8b98f" stroke="#1a1815" stroke-width="3"/>
    <!-- hair: side-swept, lighter brown -->
    <path d="M252 410 q-20-200 148-204 q150 4 158 150 q-6-70 -110-90 q-30 30 -80 30 q-70 0 -116 114 Z" fill="#5a3a22"/>
    <path d="M252 410 q-20-200 148-204 q150 4 158 150" fill="none" stroke="#1a1815" stroke-width="3" stroke-linejoin="round"/>
    <!-- eyebrows -->
    <path d="M320 396 q32-16 62 2" fill="none" stroke="#1a1815" stroke-width="6" stroke-linecap="round"/>
    <path d="M418 398 q32-18 62-2" fill="none" stroke="#1a1815" stroke-width="6" stroke-linecap="round"/>
    <!-- eyes -->
    <circle cx="352" cy="432" r="9" fill="#1a1815"/>
    <circle cx="448" cy="432" r="9" fill="#1a1815"/>
    <!-- nose -->
    <path d="M398 442 v36 q-10 6 -20 0" fill="none" stroke="#1a1815" stroke-width="4" stroke-linecap="round"/>
    <!-- smile -->
    <path d="M348 510 q52 40 104 0" fill="none" stroke="#1a1815" stroke-width="5" stroke-linecap="round"/>
  </g>
</svg>

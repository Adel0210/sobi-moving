<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="nb_sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4d9c2"></stop>
      <stop offset="1" stop-color="#ecd8cc"></stop>
    </linearGradient>
    <linearGradient id="nb_ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d9c9b3"></stop>
      <stop offset="1" stop-color="#bfa988"></stop>
    </linearGradient>
    <linearGradient id="nb_house" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffaf2"></stop>
      <stop offset="1" stop-color="#efe4cf"></stop>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#nb_ground)"></rect>
  <rect width="800" height="300" fill="url(#nb_sky)"></rect>

  <!-- distant foliage band -->
  <g opacity="0.5">
    <circle cx="60" cy="290" r="60" fill="#8aa07a"></circle>
    <circle cx="160" cy="300" r="70" fill="#7d9269"></circle>
    <circle cx="660" cy="295" r="70" fill="#8aa07a"></circle>
    <circle cx="760" cy="300" r="80" fill="#7d9269"></circle>
  </g>

  <!-- curving road -->
  <path d="M -40,600 C 260,460 420,420 480,300 C 520,220 560,160 720,120" fill="none" stroke="#cdb99c" stroke-width="70" stroke-linecap="round"></path>
  <path d="M -40,600 C 260,460 420,420 480,300 C 520,220 560,160 720,120" fill="none" stroke="#fffaf2" stroke-width="4" stroke-dasharray="14 18" opacity="0.7"></path>

  <!-- left house -->
  <g transform="translate(70,250)">
    <ellipse cx="120" cy="180" rx="120" ry="12" fill="#1a1815" opacity="0.15"></ellipse>
    <polygon points="0,70 120,10 240,70" fill="#b85c3c"></polygon>
    <polygon points="0,70 120,10 240,70" fill="#000" opacity="0.05"></polygon>
    <rect x="170" y="30" width="22" height="42" fill="#8a4127"></rect>
    <rect x="20" y="70" width="200" height="110" fill="url(#nb_house)"></rect>
    <rect x="20" y="70" width="200" height="110" fill="none" stroke="#1a1815" stroke-width="3"></rect>
    <rect x="100" y="120" width="40" height="60" fill="#1a1815"></rect>
    <rect x="100" y="120" width="40" height="60" fill="none" stroke="#1a1815" stroke-width="3"></rect>
    <rect x="44" y="92" width="40" height="40" fill="#f4d9c2" stroke="#1a1815" stroke-width="3"></rect>
    <line x1="64" y1="92" x2="64" y2="132" stroke="#1a1815" stroke-width="2"></line>
    <line x1="44" y1="112" x2="84" y2="112" stroke="#1a1815" stroke-width="2"></line>
    <rect x="156" y="92" width="40" height="40" fill="#f4d9c2" stroke="#1a1815" stroke-width="3"></rect>
    <line x1="176" y1="92" x2="176" y2="132" stroke="#1a1815" stroke-width="2"></line>
    <line x1="156" y1="112" x2="196" y2="112" stroke="#1a1815" stroke-width="2"></line>
  </g>

  <!-- sage tree between houses -->
  <g transform="translate(360,290)">
    <rect x="-7" y="55" width="14" height="70" fill="#8a4127"></rect>
    <circle cx="0" cy="35" r="48" fill="#8aa07a"></circle>
    <circle cx="-30" cy="52" r="34" fill="#7d9269"></circle>
    <circle cx="30" cy="50" r="34" fill="#7d9269"></circle>
    <circle cx="0" cy="35" r="48" fill="none" stroke="#1a1815" stroke-width="3"></circle>
  </g>

  <!-- right house -->
  <g transform="translate(500,210)">
    <ellipse cx="100" cy="160" rx="105" ry="11" fill="#1a1815" opacity="0.15"></ellipse>
    <polygon points="-5,60 100,8 205,60" fill="#b85c3c"></polygon>
    <polygon points="-5,60 100,8 205,60" fill="#000" opacity="0.05"></polygon>
    <rect x="145" y="26" width="20" height="36" fill="#8a4127"></rect>
    <rect x="15" y="60" width="170" height="100" fill="url(#nb_house)"></rect>
    <rect x="15" y="60" width="170" height="100" fill="none" stroke="#1a1815" stroke-width="3"></rect>
    <rect x="82" y="108" width="36" height="52" fill="#1a1815"></rect>
    <rect x="82" y="108" width="36" height="52" fill="none" stroke="#1a1815" stroke-width="3"></rect>
    <rect x="36" y="82" width="36" height="36" fill="#f4d9c2" stroke="#1a1815" stroke-width="3"></rect>
    <line x1="54" y1="82" x2="54" y2="118" stroke="#1a1815" stroke-width="2"></line>
    <line x1="36" y1="100" x2="72" y2="100" stroke="#1a1815" stroke-width="2"></line>
    <rect x="128" y="82" width="36" height="36" fill="#f4d9c2" stroke="#1a1815" stroke-width="3"></rect>
    <line x1="146" y1="82" x2="146" y2="118" stroke="#1a1815" stroke-width="2"></line>
    <line x1="128" y1="100" x2="164" y2="100" stroke="#1a1815" stroke-width="2"></line>
  </g>

  <!-- foreground sage tree -->
  <g transform="translate(640,400)">
    <rect x="-9" y="70" width="18" height="90" fill="#8a4127"></rect>
    <circle cx="0" cy="45" r="62" fill="#8aa07a"></circle>
    <circle cx="-40" cy="66" r="44" fill="#7d9269"></circle>
    <circle cx="40" cy="64" r="44" fill="#7d9269"></circle>
    <circle cx="0" cy="45" r="62" fill="none" stroke="#1a1815" stroke-width="3"></circle>
  </g>

  <!-- map pin marker -->
  <g transform="translate(300,360)">
    <ellipse cx="0" cy="130" rx="34" ry="9" fill="#1a1815" opacity="0.2"></ellipse>
    <path d="M 0,128 C -44,72 -52,46 -52,20 A 52,52 0 1 1 52,20 C 52,46 44,72 0,128 Z" fill="#b85c3c" stroke="#1a1815" stroke-width="3"></path>
    <circle cx="0" cy="18" r="22" fill="#fffaf2" stroke="#1a1815" stroke-width="3"></circle>
    <rect x="-9" y="6" width="18" height="20" fill="#b85c3c"></rect>
    <polygon points="-9,6 9,6 0,-4" fill="#8a4127"></polygon>
  </g>
</svg>
